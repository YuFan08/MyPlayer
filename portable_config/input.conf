# =============================================================================
# 自定义快捷键配置
# =============================================================================

# 回车键切换全屏
ENTER        cycle fullscreen

# 上下箭头调节音量（步进 2）
UP           add volume 2
DOWN         add volume -2

# 左右箭头快进后退 10 秒
RIGHT        seek 10
LEFT         seek -10

# Esc：暂停并最小化
ESC          set pause yes; set window-minimized yes
