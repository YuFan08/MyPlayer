# =============================================================================
# 自定义快捷键配置
# =============================================================================

# 回车键切换全屏
ENTER        cycle fullscreen

# 上下箭头调节音量（步进 2）
UP           add volume 2
DOWN         add volume -2

# 左右箭头快进后退 10 秒
RIGHT        seek 10
LEFT         seek -10

# 智能 Esc：第一下恢复大小，第二下最小化
ESC          script-binding smart_esc/smart_esc
