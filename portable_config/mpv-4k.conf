# ==========================================================
# mpv 配置文件 - 桌面 4K 显示器与 i5-8400 核显专属优化版
# 硬件环境: i5-8400 (UHD 630) | 4K 屏幕
# 优化目标: 完美硬解 4K 流媒体，避开 AV1 软解，高分屏适配
# ==========================================================

# 核心渲染器
vo=gpu-next
gpu-api=d3d11
d3d11-adapter=Intel
hwdec=d3d11va
d3d11-output-format=auto

# --- [2. 窗口切换优化：稳定性优先模式] ---
d3d11-flip=no
d3d11-exclusive-fs=no
vd-lavc-dr=no

# --- [3. 渲染性能平衡] ---
scale=bicubic
cscale=bicubic
dscale=mitchell
dither-depth=auto
deband=yes

# --- [4. 内存与网络缓存优化] ---
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
demuxer-readahead-secs=45
demuxer-thread=yes
demuxer-reconnect-timeout=60
cache-pause=yes
cache-pause-wait=2
force-seekable=yes

# --- [5. 直播与网络流稳定性补丁] ---
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_delay_max=5
network-timeout=100
hls-bitrate=max
http-header-fields='Referer: https://www.google.com/'
tls-verify=no

# --- [6. yt-dlp 4K 网络视频解析设置 (核心修改)] ---
# 逻辑：全面放开 4K 限制，允许解析最高画质！
# 防护：但依然保留 [vcodec!^=av01] 拦截 AV1，强制要求 YouTube 推送 4K 的 VP9 或 HEVC 给核显硬解。
ytdl-format="bestvideo[vcodec!^=av01]+bestaudio/bestvideo+bestaudio/best"

# --- [7. 窗口布局与交互设置] ---
window-minimized=yes
# 4K 屏幕下，初始窗口扩大到 1080P 比例，防止窗口太小看不清
geometry=1920x1080+50%+50%
autofit-larger=90%x90%
border=no
osc=no
osd-bar=no
# 开启高分屏 DPI 缩放支持（适配 4K 显示器的 Windows 缩放）
hidpi-window-scale=yes

# --- [8. 播放习惯保持] ---
save-position-on-quit=yes
watch-later-directory="~~/watch_later"
watch-later-options-append=write-filename-in-watch-later-config
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y

# --- [9. 鼠标与音频响应性优化] ---
framedrop=vo
input-cursor-passthrough=no
ao=wasapi
volume-max=100
volume=30
audio-pitch-correction=yes
audio-file-auto=fuzzy
video-sync=display-resample
