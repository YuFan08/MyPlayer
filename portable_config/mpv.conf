# =============================================================================
# mpv 优化配置文件 (mpv.conf)
# 硬件环境：Intel UHD 630 + GTX 1060 (核显直通旁路独显，注重发热控制与稳定性)
# =============================================================================

# ────────────────────────────────────────────────────────
# 1. 核心渲染与硬件解码 (Hardware Decoding & Rendering)
# ────────────────────────────────────────────────────────
# 使用最稳定的 GPU 渲染器
vo=gpu-next
# 锁定 D3D11 接口并指定使用 Intel 核显渲染，使独显保持休眠
gpu-api=d3d11
d3d11-adapter=Intel
# 原生 D3D11VA 硬件解码 (零拷贝)
hwdec=d3d11va
# D3D11 窗口化性能优化 (开启 Direct Rendering 降低延迟，开启 Flip 模式提升全屏流畅度)
vd-lavc-dr=yes
d3d11-flip=yes
# 限制 D3D11 显存分配，防止极端情况下核显内存溢出
d3d11-exclusive-fs=no
# 更好地与 Windows 颜色管理沟通
target-colorspace-hint=yes

# ────────────────────────────────────────────────────────
# 2. 画质缩放 (Scaling)
# ────────────────────────────────────────────────────────
# 缩放算法 (Spline36 锐度比 Bicubic 更高，核显压力适中)
scale=spline36
cscale=spline36
dscale=mitchell

# ────────────────────────────────────────────────────────
# 3. 内存缓存控制 (Cache & Buffer)
# ────────────────────────────────────────────────────────
cache=yes
# 允许最大正向与反向缓存大小
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
# 直播不宜过大预读，防止堆积
demuxer-readahead-secs=45
demuxer-thread=yes
# 缓存等待时间及策略
cache-pause=yes
cache-pause-wait=2
force-seekable=yes

# ────────────────────────────────────────────────────────
# 4. 网络流媒体与协议支持 (Network & Streaming)
# ────────────────────────────────────────────────────────
# 伪装 UA 和 Referer，防止被某些网络源阻隔
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
http-header-fields='Referer: https://www.google.com/'

# 流媒体超时设置
network-timeout=100
demuxer-reconnect-timeout=70

# FFmpeg 级别 HTTP 重连策略 (应对网络波动)
# 策略：最多重连 6 次，时间指数级退避
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_on_network_error=1,reconnect_max_retries=6,reconnect_delay_max=120,reconnect_delay_total_max=70

# HLS 直播画质选择以及证书绕过 (注意配置安全)
hls-bitrate=max
tls-verify=no

# ────────────────────────────────────────────────────────
# 5. yt-dlp 解析规则 (YouTube/BiliBili 等)
# ────────────────────────────────────────────────────────
# 优先拉取 1080p 以下画质的视频（并且尽量避开高运算量的 AV1 编码），兜底 best
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"
# 如需指定 yt-dlp 路径，可取消下方注释：
# script-opts=ytdl_hook-ytdl_path="C:/你的路径/yt-dlp.exe"

# ────────────────────────────────────────────────────────
# 6. 音频通道与音量控制 (Audio & Volume)
# ────────────────────────────────────────────────────────
# 使用 WASAPI 独占通道
ao=wasapi
# 设置初始音量为 30，最大可调到 100
volume=30
volume-max=100
# 视频同步与插帧 (针对 144Hz 屏幕优化，消除抖动)
video-sync=display-resample
interpolation=yes
tscale=oversample
audio-pitch-correction=yes
# 自动加载同名字幕或音频
audio-file-auto=fuzzy

# ────────────────────────────────────────────────────────
# 7. 播放器界面与窗口行为 (UI & Window)
# ────────────────────────────────────────────────────────
# 启动时默认窗口大小及其边界
geometry=1280x720+50%+50%
autofit-larger=90%x90%
window-minimized=no
# 隐藏边框，隐藏自带 OSC (为脚本腾出空间)
border=no
osc=no
osd-bar=no
# 点击穿透关闭与高负载掉帧策略
input-cursor-passthrough=no
framedrop=vo

# ────────────────────────────────────────────────────────
# 8. 播放进度记忆 (Watch Later)
# ────────────────────────────────────────────────────────
# 退出时记住当前播放进度
save-position-on-quit=yes
# 同时记录原视频文件名以便于排查或手动恢复
write-filename-in-watch-later-config=yes
# 恢复时剔除临时修改的界面与字幕位置
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y

# ────────────────────────────────────────────────────────
# 9. 截图设置 (Screenshots)
# ────────────────────────────────────────────────────────
# 截图保存路径 (~~/ 指向 portable_config，../ 指向 mpv 根目录)
screenshot-directory="~~/../screenshot"
# 截图文件名模板: 文件名-进度 (百分比时间)-序号
screenshot-template="%F-%p-%n"
# 截图格式
screenshot-format=png
# 高质量 JPEG 可选，默认使用 PNG
# screenshot-jpeg-quality=95

