# ==============================================================================
# mpv 播放器核心配置文件 (mpv.conf)
#
# 优化目标：极佳的流畅度体验、稳定的流媒体播放、适配双显卡/高刷屏环境
# 硬件环境：Intel 核显 (UHD 630 主力渲染) + 独显 (GTX 1060 旁路休眠) / 144Hz 高刷显示器
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心渲染与硬件解码 (Rendering & Hardware Decoding)
# ------------------------------------------------------------------------------
vo=gpu-next               # 使用基于 libplacebo 的下一代 GPU 渲染器
gpu-api=d3d11             # 指定使用 D3D11 图形 API
d3d11-adapter=Intel       # 强制使用 Intel 核显渲染 (保持独显休眠以控制发热)
hwdec=d3d11va             # 开启 D3D11VA 原生硬件解码 (零拷贝，降低系统开销)
vd-lavc-dr=yes            # 开启 Direct Rendering (配合 hwdec 实现零拷贝闭环)
d3d11-flip=no            # 开启现代 Flip 呈现模式 (降低延迟，提升窗口模式流畅度)
d3d11-exclusive-fs=yes     # 禁用独占全屏 (防止全屏切换时的卡顿和鼠标失灵)
gpu-shader-cache-dir="~~/../cache/shaders" # 开启着色器缓存，大幅提升启动速度

# 注：为保障 Intel 核显在 144Hz 下的同步性能，已关闭复杂的色彩管理选项
# target-colorspace-hint=yes
# icc-profile-auto=yes

# ------------------------------------------------------------------------------
# 2. 画质缩放算法 (Scaling)
# ------------------------------------------------------------------------------
scale=spline36            # 放大算法：在核显性能与画面锐度之间取得最佳平衡
cscale=spline36           # 色度放大算法
dscale=mitchell           # 缩小算法

# ------------------------------------------------------------------------------
# 3. 内存缓存控制 (Cache & Buffer)
# ------------------------------------------------------------------------------
cache=yes                 # 开启内存缓存
demuxer-max-bytes=400MiB  # 最大正向预读缓存大小
demuxer-max-back-bytes=100MiB # 最大反向保留缓存大小
demuxer-readahead-secs=45 # 限制预读时间 (防止直播流缓存堆积)
demuxer-thread=yes        # 异步读取缓存
cache-pause=yes           # 缓存不足时自动暂停
cache-pause-wait=2        # 恢复播放前需等待的缓存秒数
force-seekable=yes        # 强制允许在缓存中跳转

# ------------------------------------------------------------------------------
# 4. 网络流媒体优化 (Network & Streaming)
# ------------------------------------------------------------------------------
# 伪装浏览器指纹，提升网络源兼容性
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
http-header-fields='Referer: https://www.google.com/'

# 本地网络代理设置 (HLS 解析等适用)
http-proxy="http://127.0.0.1:7897"
ytdl-raw-options=proxy="http://127.0.0.1:7897"

# 连接超时与重连容错机制
network-timeout=100
demuxer-reconnect-timeout=70
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_on_network_error=1,reconnect_max_retries=6,reconnect_delay_max=120,reconnect_delay_total_max=70

# 直播协议设定
hls-bitrate=max           # 默认拉取最高画质的 HLS 流
tls-verify=no             # 忽略 TLS 证书验证 (提高连接成功率)

# ------------------------------------------------------------------------------
# 5. 视频源解析 (yt-dlp)
# ------------------------------------------------------------------------------
# 格式策略：最高 1080P，且主动避开核显无法硬解的 AV1 编码，兜底采用最优画质
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"

# ------------------------------------------------------------------------------
# 6. 音视频同步与音频输出 (Sync & Audio)
# ------------------------------------------------------------------------------
# 高刷屏同步方案 (彻底解决 60fps 视频在 144Hz 屏幕上的撕裂与卡顿)
video-sync=display-resample # 以显示器刷新率为主时钟进行同步
interpolation=yes           # 开启平滑插帧补偿
tscale=oversample           # 插帧算法：开销极低且效果显著，完美适配核显

# 音频输出与设定
ao=wasapi                   # 使用 Windows WASAPI 独占音频输出通道
volume=30                   # 默认启动音量
volume-max=100              # 最大音量限制
audio-pitch-correction=yes  # 变速播放时保持音调不变
audio-file-auto=fuzzy       # 自动加载同目录下的外部音轨或字幕

# ------------------------------------------------------------------------------
# 7. 窗口界面与交互行为 (UI & Window)
# ------------------------------------------------------------------------------
geometry=1280x720+50%+50%   # 默认窗口尺寸与初始位置 (居中)
autofit-larger=90%x90%      # 限制最大窗口尺寸不超过屏幕 90%
window-minimized=no         # 启动时不最小化窗口
keep-open=yes               # 播放结束时保持窗口开启，不自动退出
input-cursor-passthrough=no # 禁用鼠标点击穿透
# framedrop=vo              # (已禁用) 避免暴力丢帧策略导致画面不连贯

# 隐藏原生 UI 组件 (为第三方脚本如 ModernX/ModernZ 腾出无干扰空间)
border=no                   # 隐藏系统窗口边框
osc=no                      # 禁用原生屏幕控制栏 (OSC)
osd-bar=no                  # 禁用原生 OSD 进度条

# ------------------------------------------------------------------------------
# 8. 播放进度记忆 (Watch Later)
# ------------------------------------------------------------------------------
save-position-on-quit=yes   # 退出时自动保存当前播放进度
write-filename-in-watch-later-config=yes # 记录历史文件名，便于排查恢复
watch-later-options-remove=sub-pos       # 恢复进度时不继承临时修改的字幕位置
watch-later-options-remove=osd-margin-y  # 恢复进度时不继承临时修改的 OSD 边距

# ------------------------------------------------------------------------------
# 9. 截图设置 (Screenshots)
# ------------------------------------------------------------------------------
screenshot-directory="~~/../screenshot"  # 截图保存根路径
screenshot-template="%F-%p-%n"           # 命名模板：文件名-播放百分比-序号
screenshot-format=png                    # 截图格式 (默认 PNG，保障无损画质)

# ------------------------------------------------------------------------------
# 10. 调试与日志 (Logging)
# ------------------------------------------------------------------------------
log-file="~~/../mpv.log"                 # 开启日志输出，便于运行时故障排查