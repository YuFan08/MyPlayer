# ==============================================================================
#  mpv 播放器核心配置文件 (Rev. 最新重构版)
# ==============================================================================
#  定位：本地高刷影音终端 & 在线流媒体解析引擎
#  环境：Windows 11 / 144Hz OLED / 双显卡协同配合
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心渲染与硬件解码 (Core & Decoding)
# ------------------------------------------------------------------------------
vo=gpu-next                             # 更现代的底层渲染器，拥有极佳的着色器和 HDR 映射性能
gpu-api=d3d11                           # Windows 平台推荐图形 API，兼容性最佳
d3d11-adapter=Intel                     # 指定核显渲染 (合理利用 UHD 630 算力，控制整机发热)
hwdec=d3d11va                           # Win 平台最靠谱的硬解模式，实现看视频零 CPU 占用
d3d11-flip=yes                          # [核心] 现代翻转呈现模型：打通 HDR 直通与低延迟的命脉
d3d11-exclusive-fs=no                   # 配合 Flip 模式，实现真正的无缝全屏秒切 (不闪屏/不黑屏)
gpu-shader-cache-dir="~~/../cache/shaders" # 着色器缓存目录：显著提升视频二次打开的缓冲速度

# ------------------------------------------------------------------------------
# 2. HDR 与色彩映射 (HDR & Color Management)
# ------------------------------------------------------------------------------
target-colorspace-hint=yes              # 允许向 Windows 发送原生 HDR 信号 (HDR 直通的核心关键)
# icc-profile-auto=yes                  # (留白) 自动加载显示器 ICC (处于注释状态避免与 HDR 冲突)

# ------------------------------------------------------------------------------
# 3. 画质缩放算法 (Scaling)
# ------------------------------------------------------------------------------
scale=spline36                          # 画面横向放大：在核显偏弱的算力下，最锐利清晰的甜点算法
cscale=spline36                         # 色度通道放大
dscale=mitchell                         # 缩小算法：大幅减少画面缩小时产生的像素锯齿和环状失真

# ------------------------------------------------------------------------------
# 4. 高刷屏同步与平滑补偿 (Sync & Interpolation)
# ------------------------------------------------------------------------------
video-sync=display-resample             # [防撕裂] 视频时间轴严格依附显示器 144Hz 刷新率同步
interpolation=yes                       # 补帧引擎启动：抚平 24/30fps 源在平移镜头时的微度卡顿
tscale=oversample                       # 补帧内核：极其轻量、护眼、无残影，堪称核显最佳搭档

# ------------------------------------------------------------------------------
# 5. 音频系统 (Audio System)
# ------------------------------------------------------------------------------
ao=wasapi                               # 独占模式音频输出，绕过系统混音器干扰，音质最纯净
volume=30                               # 初始默认启动音量
volume-max=100                          # 禁用暴力的软性音量放大，保护耳朵和耳机硬件
audio-file-auto=fuzzy                   # 智能挂载：自动读取同名或近似文件名的外部音轨和字幕

# ------------------------------------------------------------------------------
# 6. 流媒体预读与内存缓存 (Streaming & Buffer)
# ------------------------------------------------------------------------------
cache=yes                               # 激活全局内存缓冲机制
demuxer-max-bytes=400MiB                # 重装上阵：分配高达 400MB 的内存海纳正向预读视频
demuxer-max-back-bytes=100MiB           # 为了丝滑倒退进度条，特意留存的 100MB 回溯历史缓存
demuxer-readahead-secs=45               # 防止在线长连接无限制堆积，限制最大超前解析秒数
cache-pause-wait=2                      # 出现网络卡顿转圈时，憋满两秒数据再播放，避免频繁卡停
force-seekable=yes                      # 强力破冰：允许在未缓存完全的流媒体文件中强行拖拽进度条

# ------------------------------------------------------------------------------
# 7. 网络代理与伪装欺骗 (Network & Proxy)
# ------------------------------------------------------------------------------
# 伪装自身为现代 Chrome 浏览器，极大提高防盗链拦截的通过率
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
http-header-fields='Referer: https://www.google.com/'

# 底层直连与 yt-dlp 专用本地代理端口
http-proxy="http://127.0.0.1:7897"
ytdl-raw-options=proxy="http://127.0.0.1:7897"

# 解析格式过滤宏：首选 1080P 片源以保护核显，同时坚决避开核显无法硬解的 AV1 恐怖编码
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"

# ------------------------------------------------------------------------------
# 8. 弱网环境重连策略 (Reconnect Mechanism)
# ------------------------------------------------------------------------------
network-timeout=100                     # 提升整体网络请求超时容忍度
demuxer-reconnect-timeout=70            # 流媒体解析断开的安全判断阈值
tls-verify=no                           # 无视源站可疑的 TLS 证书验证（某些直播流的救命稻草）
# 魔鬼防掉线宏指令：遭遇网络闪断时，系统性进行自动续流重试的基石
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_on_network_error=1,reconnect_max_retries=6,reconnect_delay_max=120,reconnect_delay_total_max=70

# ------------------------------------------------------------------------------
# 9. 界面视图与交互 (UI & Interaction)
# ------------------------------------------------------------------------------
geometry=1280x720+50%+50%               # 默认在屏幕中心极具仪式感地唤出 720P 窗口
autofit-larger=90%x90%                  # 防止误点 4K 视频时画面暴走撑破显示器边界
keep-open=yes                           # 播完不要走！定格在最后一帧画面回味
border=no                               # 扒掉 Windows 本机丑陋的系统边框，实现伪沉浸感
osc=no                                  # 彻底禁用原版极简 UI (为后续加持 ModernX/UOSC 脚本腾出底板)
osd-bar=no                              # 禁用官方原生横条进度条

# ------------------------------------------------------------------------------
# 10. 行为记忆系统 (Watch Later)
# ------------------------------------------------------------------------------
save-position-on-quit=yes               # 断点续传，下次打开从上次退出的时间点精准继续
write-filename-in-watch-later-config=yes# 记录上次看的是什么文件，方便人类肉眼去配置里查账
watch-later-options-remove=sub-pos      # 进度恢复时拦截干扰：拒绝继承上次看片时你随便拖拽的字幕位置
watch-later-options-remove=osd-margin-y # 进度恢复时拦截干扰：拒绝继承残留的 OSD 偏移量

# ------------------------------------------------------------------------------
# 11. 功能输出与日志诊断 (Misc)
# ------------------------------------------------------------------------------
screenshot-directory="~~/../screenshot" # 把所有的惊艳瞬间都规矩地存在专门的文件夹里
screenshot-template="%F-%p-%n"          # 强迫症福音模板：原视频名 - 播放进度百分比 - 编号
screenshot-format=png                   # 截图就得用骨灰级的无损 PNG 格式
log-file="~~/../mpv.log"                # 平安无事不看它，播放崩溃时它就是破案日记

# ------------------------------------------------------------------------------
# 12. 极限画质智能避险机制 (Auto Profile Fallback)
# ------------------------------------------------------------------------------
# 【核显保命屏障】
# 如果你在播放超过 30 帧的视频，同时还拥有 HDR (PQ/HLG) 这类需要海量算力映射的神级画质
# 此时如果还在 144Hz 强行重采样插帧，UHD 630 的算力会瞬间被击穿导致海量掉帧。
# 此机制将在危急时刻暗中激活：自动关闭多余的 144Hz 重采样强迫症，果断退回最稳固的原生音轨同步播放模式！
[heavy-video-fallback]
profile-cond=p.container_fps > 30 or (p.video_params and p.video_params.gamma == "pq") or (p.video_params and p.video_params.gamma == "hlg")
video-sync=audio
interpolation=no
profile-restore=copy