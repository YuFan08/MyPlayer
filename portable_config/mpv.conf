# =============================================================================
# mpv 便携配置 | 核显直通（UHD 630）· 多窗口稳定 · 低负载
# 机器：i7-8750H / GTX 1060 / 16GB — 目标：独显旁路、少黑屏、静音低温
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 解码与输出（gpu-next + D3D11 + Intel）
# -----------------------------------------------------------------------------
# 核心渲染器：gpu-next，利于切后台唤醒与暂停后重绘
vo=gpu-next
gpu-api=d3d11
# 锁定 Intel UHD 630 渲染
d3d11-adapter=Intel
# 原生 D3D11VA 硬解（零拷贝）
hwdec=d3d11va
# 输出格式 auto，减轻 10bit/16bit 切换时的屏闪（蓝/青闪）
d3d11-output-format=auto

# -----------------------------------------------------------------------------
# 2. 全屏与窗口切换（稳定性优先）
# -----------------------------------------------------------------------------
# 关闭翻转模式
d3d11-flip=no
# 禁用独占全屏
d3d11-exclusive-fs=no
# gpu-next 下关闭 direct rendering，提升暂停后再显示的唤醒成功率
vd-lavc-dr=no

# -----------------------------------------------------------------------------
# 3. 缩放与画质（核显负载与观感平衡）
# -----------------------------------------------------------------------------
# Bicubic：优于 bilinear，负载仍低
scale=bicubic
cscale=bicubic
#dscale=bicubic
dscale=mitchell
dither-depth=auto
# 去色带开：高负载时若卡顿可再关
deband=yes

# -----------------------------------------------------------------------------
# 4. 缓存与解复用
# -----------------------------------------------------------------------------
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
# 直播不宜过大预读，避免顶到 playlist 尽头
demuxer-readahead-secs=45
demuxer-thread=yes
# 与下方 lavf/HTTP 重试配合，略大于一轮重试总时长
demuxer-reconnect-timeout=70
cache-pause=yes
cache-pause-wait=2
force-seekable=yes

# -----------------------------------------------------------------------------
# 5. 网络与直播（HLS / HTTP）
# -----------------------------------------------------------------------------
# 常见 UA，降低被源站刁难概率
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
# FFmpeg HTTP 重连（HLS 分片走 http/https 时生效）
# reconnect_max_retries=6：至多 6 轮重连后仍失败则退出；reconnect_delay_total_max 为累计等待上限（秒）
# 退避为指数型（约 0→1→3→7→15→31 s），非固定间隔；reconnect_delay_max=120 避免大步被截断
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_on_network_error=1,reconnect_max_retries=6,reconnect_delay_max=120,reconnect_delay_total_max=70
network-timeout=100
hls-bitrate=max
http-header-fields='Referer: https://www.google.com/'
tls-verify=no

# -----------------------------------------------------------------------------
# 6. yt-dlp
# -----------------------------------------------------------------------------
# 优先 ≤1080p 且非 AV1；否则 1080p 任意；再否则 best
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"
# 如果你的 yt-dlp.exe 就放在 mpv.exe 同级目录下，这一行可以不写。
# 如果放在其他地方，请取消下面最后一行的注释并修改为实际的绝对路径：
# script-opts=ytdl_hook-ytdl_path="C:/你的路径/yt-dlp.exe"

# -----------------------------------------------------------------------------
# 7. 窗口与 OSD
# -----------------------------------------------------------------------------
window-minimized=no
geometry=1280x720+50%+50%
autofit-larger=90%x90%
border=no
osc=no
osd-bar=no

# -----------------------------------------------------------------------------
# 8. 播放进度（watch later）
# -----------------------------------------------------------------------------
# 网络流/直播也会尝试记进度
save-position-on-quit=yes
# 在进度文件内记录原视频文件名（便于排查代码问题）
write-filename-in-watch-later-config=yes
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y
# 额外增加：如果视频少于 5 秒则不记录（可选）
# ignore-path-with-proxy=yes

# -----------------------------------------------------------------------------
# 9. 输入与掉帧策略
# -----------------------------------------------------------------------------
framedrop=vo
input-cursor-passthrough=no

# -----------------------------------------------------------------------------
# 10. 音频与同步
# -----------------------------------------------------------------------------
ao=wasapi
volume-max=100
volume=30
audio-pitch-correction=yes
audio-file-auto=fuzzy
video-sync=display-resample
