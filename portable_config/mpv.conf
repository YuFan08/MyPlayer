# ==========================================================
# mpv 配置文件 - 极致核显直通与多窗口稳定版
# 硬件环境: i7-8750H | GTX 1060 | 16GB RAM
# 优化目标: 100% 旁路独显（强制休眠 1060），解决切换黑屏，低热静音
# ==========================================================

[default]
# ==========================================================
# 默认配置：本地/点播优先（副作用更少），仍然强制核显直通
# 需要更强直播补丁时，用：mpv --profile=live <url>
# 遇到切后台/黑屏等顽固问题时，用：mpv --profile=compat <file/url>
# ==========================================================

# --- [1. 核心渲染路径：锁定 Intel 核显] ---
vo=gpu-next
gpu-api=d3d11
d3d11-adapter=Intel
hwdec=d3d11va
d3d11-output-format=auto

# --- [2. 全屏/切换：默认避免独占全屏] ---
d3d11-exclusive-fs=no

# --- [3. 低负载画质：核显友好] ---
scale=bicubic
cscale=bicubic
dscale=mitchell
dither-depth=auto
deband=no

# --- [4. 窗口布局与交互] ---
window-minimized=yes
# 仅固定初始尺寸；位置交给系统，避免不同环境下 “+50%+50%” 造成偏移/错位
geometry=1280x720
autofit-larger=90%x90%
border=no
osc=no
osd-bar=no

# --- [5. 播放习惯保持] ---
save-position-on-quit=yes
watch-later-directory="~~/watch_later"
watch-later-options-append=write-filename-in-watch-later-config
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y

# --- [6. 鼠标响应性] ---
framedrop=vo
input-cursor-passthrough=no

# --- [7. 音频输出与同步] ---
ao=wasapi
volume-max=100
volume=30
audio-pitch-correction=yes
audio-file-auto=fuzzy
video-sync=display-resample

# --- [8. yt-dlp 网络视频解析设置] ---
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"
# script-opts=ytdl_hook-ytdl_path="C:/你的路径/yt-dlp.exe"


[live]
profile-desc="直播/网络流稳定性增强（更强缓存/重连/伪装；可能增加延迟与内存占用）"

# 直播常见黑屏/设备重置绕行：更偏稳定性
d3d11-flip=no
vd-lavc-dr=no

# 缓存与预读：抗抖动（多开窗口时注意内存占用）
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
demuxer-readahead-secs=45
demuxer-thread=yes
cache-pause=yes
cache-pause-wait=2

# 重连与超时：尽量不断流
demuxer-reconnect-timeout=60
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_delay_max=5
network-timeout=100

# HLS：默认请求最高码率
hls-bitrate=max

# 伪装：按需使用（少数站点需要 Referer 才放行）
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
http-header-fields='Referer: https://www.google.com/'

# 注意：默认保持证书校验更安全；如遇到“证书/抓包环境”导致无法播放，再用 live-unsafe
tls-verify=yes

# 强制 seekable 副作用很大：仅在你明确需要“在缓存范围内拖拽”时启用此 profile
force-seekable=yes


[live-unsafe]
profile-desc="不安全：关闭 TLS 校验（仅用于你完全信任的源/网络环境）"
profile=live
tls-verify=no


[compat]
profile-desc="兼容/保底：前后台切换更稳（牺牲部分性能/效率）"
d3d11-flip=no
d3d11-exclusive-fs=no
vd-lavc-dr=no
