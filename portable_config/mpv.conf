# ==========================================================
# mpv 配置文件 - 极致核显直通与多窗口稳定版
# 硬件环境: i7-8750H | GTX 1060 | 16GB RAM
# 优化目标: 100% 旁路独显（强制休眠 1060），解决切换黑屏，低热静音
# ==========================================================

# 核心渲染器：使用下一代渲染器 gpu-next，专门优化了“切后台唤醒”和“暂停重绘”逻辑
vo=gpu-next
gpu-api=d3d11
# 锁定 Intel UHD 630 渲染
d3d11-adapter=Intel
# 使用原生 D3D11VA 硬解 (零拷贝)
hwdec=d3d11va
# 将输出格式设为 auto。防止显卡驱动在加载资源时因为强制切换 10 位/16 位色深而在显示器上产生蓝光/青光闪烁
d3d11-output-format=auto

# --- [2. 窗口切换优化：稳定性优先模式] ---
# 关闭翻转模式
d3d11-flip=no
# 禁用独占全屏
d3d11-exclusive-fs=no
# 在 gpu-next 下，关闭直接渲染可以大幅提升“暂停模式”下的唤醒成功率
vd-lavc-dr=no

# --- [3. 渲染性能平衡：极低负载高清方案] ---
# 使用 Bicubic 替代 Spline36。Bicubic 是性能与画质的极佳平衡点，远好于 bilinear 且 3D 负载极低
scale=bicubic
cscale=bicubic
#dscale=bicubic
dscale=mitchell
# 开启自动抖动，防止色彩精度丢失
dither-depth=auto
# 关闭去色带，以节省大量核显 3D 算力，彻底杜绝高负载下的画面卡顿和风扇起飞
deband=no

# --- [4. 内存与网络缓存优化：无惧网络波动] ---
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
# 预读时间适当减小（从 300 下调），防止直播源由于过度预读取空导致断流
demuxer-readahead-secs=45
# 开启解复用器独立线程，提升渲染压力下的 UI 响应
demuxer-thread=yes
# 允许断线自动重连，核心点：当连接中断时尝试重新连接
demuxer-reconnect-timeout=60
# 缓存空时自动暂停等待 2 秒以填充缓冲区，防止画面频繁卡顿
cache-pause=yes
cache-pause-wait=2
# 强制允许网络流媒体在已缓存的进度内自由拖拽
force-seekable=yes

# --- [直播稳定性增强补丁] ---
# 模拟主流浏览器，防止被直播源服务器封禁
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
# 强制开启 FFmpeg 底层的重连选项 (针对 HLS/m3u8 协议)
# 【修复】：之前误将 ffmpeg 的重连参数传给了 yt-dlp，导致解析程序由于“参数错误”直接闪退。现在改为使用专业的 lavf (ffmpeg) 原生传参通道。
demuxer-lavf-o=reconnect=1,reconnect_streamed=1,reconnect_delay_max=5
# 增加网络超时容忍时间
network-timeout=100
# 默认请求最高码率
hls-bitrate=max
http-header-fields='Referer: https://www.google.com/'
# 强制忽略证书校验
tls-verify=no

# --- [9. yt-dlp 网络视频解析设置] ---
# 强制保底逻辑：优先选 1080P 非 AV1；找不到则选普通 1080P；最后选任意可用格式
ytdl-format="bestvideo[height<=1080][vcodec!^=av01]+bestaudio/bestvideo[height<=1080]+bestaudio/best"
# 如果你的 yt-dlp.exe 就放在 mpv.exe 同级目录下，这一行可以不写。
# 如果放在其他地方，请取消下面最后一行的注释并修改为实际的绝对路径：
# script-opts=ytdl_hook-ytdl_path="C:/你的路径/yt-dlp.exe"


# --- [5. 窗口布局与交互设置] ---
# 开启最小化启动模式：启动时不直接出现在屏幕中央，而是乖乖待在任务栏
window-minimized=yes
# 强制启动窗口为 1280x720，并居中显示
geometry=1280x720+50%+50%
# 如果视频原始尺寸过大，限制其最大不超过屏幕的 90%
autofit-larger=90%x90%
# 禁用边框，保持简洁视觉
border=no
# 禁用内置 OSC 控制条与 OSD 进度条（适配自定义脚本使用）
osc=no
osd-bar=no

# --- [6. 播放习惯保持] ---
# 核心：退出时自动保存播放进度（下次打开自动跳到上次位置）
save-position-on-quit=yes
# 进度记录存放目录：设为 mpv 文件夹下的 watch_later 目录，保证便携性
watch-later-directory="~~/watch_later"
# 即使是网络流/直播，也尝试记录进度（部分直播源不支持，但点播类 m3u8 有效）
watch-later-options-append=write-filename-in-watch-later-config
# 禁用 watch-later 记忆 UI 边距，防止由于不同视频比例导致的窗口乱跳
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y

# --- [7. 鼠标响应性优化] ---
# 允许在核显压力大时丢弃视频帧以优先维持 UI 操作响应
framedrop=vo
input-cursor-passthrough=no

# --- [8. 音频输出与音量控制] ---
# 使用 Windows 原生 WASAPI 输出，音质更好且延迟极低
ao=wasapi
# 设置最大音量上限，防止直播源爆音保护耳朵
volume-max=100
# 默认启动音量
volume=30
# 开启音频变速滤镜：即便倍速播放视频，声音也不会变调（防止变“尖”或变“沉”）
audio-pitch-correction=yes
# 自动加载同名外部音频文件
audio-file-auto=fuzzy
# 优化音画同步策略，防止网络流波动导致的音画错位
video-sync=display-resample
