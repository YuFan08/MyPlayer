# ==========================================================
# mpv 配置文件 - 极致核显直通与多窗口稳定版
# 硬件环境: i7-8750H | GTX 1060 | 16GB RAM
# 优化目标: 100% 旁路独显（强制休眠 1060），解决切换黑屏，低热静音
# ==========================================================

# --- [1. 核心渲染管线：强制 Intel 核显直通] ---
vo=gpu
gpu-api=d3d11
# 锁定 Intel UHD 630 渲染，让 GTX 1060 彻底进入省电休眠状态
d3d11-adapter=Intel
# 使用原生 D3D11VA 硬解，实现从解码到显示的零拷贝传输
hwdec=d3d11va

# --- [2. 窗口切换优化：稳定性优先模式] ---
# 使用兼容性最好的模式。解决 Intel 驱动在 Windows 下可能导致的系统级卡顿与鼠标失效
d3d11-flip=no
# 禁用独占全屏，确保窗口化与全屏切换时 DWM 合成器不发生重置
d3d11-exclusive-fs=no
# 开启直接渲染，减少解码层到渲染层的内存拷贝延迟
vd-lavc-dr=yes

# --- [3. 渲染性能平衡：极低负载高清方案] ---
# 使用 Bicubic 替代 Spline36。Bicubic 是性能与画质的极佳平衡点，远好于 bilinear 且 3D 负载极低
scale=bicubic
cscale=bicubic
dscale=mitchell
# 开启自动抖动，防止色彩精度丢失
dither-depth=auto
# 关闭去色带，以节省大量核显 3D 算力，彻底杜绝高负载下的画面卡顿
deband=no

# --- [4. 内存与网络缓存优化：无惧网络波动] ---
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
# 强制网络视频积极预读
demuxer-readahead-secs=300
# 强制允许网络流媒体在已缓存的进度内自由拖拽
force-seekable=yes

# --- [直播稳定性增强补丁] ---
# 模拟 Chrome 浏览器，防止被直播源服务器封禁或限速
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
# 增加网络超时容忍：如果 30 秒没收到数据才报错（默认太短）
network-timeout=60
# 告诉底层 ffmpeg 开启自动重连
hls-bitrate=max
http-header-fields='Referer: https://www.google.com/'
# 增加连接重试次数
tls-verify=no


# --- [5. 窗口布局与交互设置] ---
# 强制启动窗口为 1280x720，并居中显示
geometry=1280x720+50%+50%
# 如果视频原始尺寸过大，限制其最大不超过屏幕的 90%
autofit-larger=90%x90%
# 禁用边框，保持简洁视觉
border=no
# 禁用内置 OSC 控制条与 OSD 进度条（适配自定义脚本使用）
osc=no
osd-bar=no

# --- [6. 播放习惯保持] ---
# 退出时自动保存播放进度
save-position-on-quit=yes
# 禁用 watch-later 记忆 UI 边距，防止不同尺寸视频导致的窗口位移
watch-later-options-remove=sub-pos
watch-later-options-remove=osd-margin-y

# --- [7. 鼠标响应性优化] ---
# 允许在核显压力大时丢弃视频帧以优先维持 UI 操作响应
framedrop=vo
input-cursor-passthrough=no
